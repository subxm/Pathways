server:
  port: 9090

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # User Authentication /me (Protected)
        - id: user-service-me
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/me
          filters:
            - JwtAuthenticationFilter

        # User Authentication routes (Public)
        - id: user-service-public
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
            
        # Path generation and progress routes (Protected)
        - id: path-service-protected
          uri: http://localhost:8082
          predicates:
            - Path=/api/paths/**
          filters:
            - JwtAuthenticationFilter

        # Chat assistant routes (Protected)
        - id: chat-service-protected
          uri: http://localhost:8083
          predicates:
            - Path=/api/chat/**
          filters:
            - JwtAuthenticationFilter

jwt:
  secret: pathways_secret_key_must_be_at_least_256_bits_long_for_security_reasons_1234567890
